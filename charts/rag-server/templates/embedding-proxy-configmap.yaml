{{- if .Values.embeddingProxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rag-server.fullname" . }}-embedding-proxy
  labels:
    {{- include "rag-server.labels" . | nindent 4 }}
data:
  proxy.py: |
    import json
    import logging
    import os
    import sys
    from http.server import ThreadingHTTPServer, BaseHTTPRequestHandler
    from urllib.request import Request, urlopen
    from urllib.error import HTTPError, URLError

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s [%(levelname)s] %(message)s",
        stream=sys.stdout,
    )
    log = logging.getLogger("embedding-proxy")

    UPSTREAM_URL = os.environ.get("UPSTREAM_URL", "http://localhost:8080")
    PROXY_PORT = int(os.environ.get("PROXY_PORT", "8080"))

    NIM_ONLY_FIELDS = {"input_type", "truncate", "dimensions"}


    def translate_nim_to_vllm(nim_body: dict) -> dict:
        """Strip NIM-specific fields that vLLM does not accept.

        Both NIM and vLLM use the OpenAI /v1/embeddings format, so only
        NIM-incompatible extras need to be removed:
          - input_type  (query vs passage -- not supported by vLLM)
          - truncate    (NONE / START / END -- not supported by vLLM)
          - dimensions  (vLLM rejects this for non-matryoshka models)

        Note: stripping input_type means the model will not distinguish
        between query and passage embeddings. If the upstream vLLM model
        requires this distinction, configure it at the vLLM serving level
        (e.g., via --chat-template or task-specific prompt prefixes).
        """
        errors = []
        if "input" not in nim_body:
            errors.append("'input' field is required")
        if errors:
            raise ValueError("; ".join(errors))

        vllm_body = {k: v for k, v in nim_body.items() if k not in NIM_ONLY_FIELDS}
        return vllm_body


    def proxy_upstream(method: str, path: str, body: bytes = None) -> tuple:
        """Forward a request to the upstream and return (status, response_bytes)."""
        url = f"{UPSTREAM_URL}{path}"
        req = Request(url, data=body, method=method)
        req.add_header("Accept", "application/json")
        if body is not None:
            req.add_header("Content-Type", "application/json")
        try:
            with urlopen(req) as resp:
                return resp.status, resp.read()
        except HTTPError as exc:
            return exc.code, exc.read()
        except URLError as exc:
            err = json.dumps({"error": f"upstream unreachable: {exc.reason}"}).encode()
            return 502, err


    class ProxyHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self._send_json(200, {"status": "ok"})
                return
            if self.path in ("/v1/models", "/models"):
                status, data = proxy_upstream("GET", "/v1/models")
                self._send_raw(status, data)
                return
            self._send_json(404, {"error": "not found"})

        def do_POST(self):
            if self.path not in ("/embeddings", "/v1/embeddings"):
                self._send_json(404, {"error": f"unknown path: {self.path}"})
                return

            content_length = int(self.headers.get("Content-Length", 0))
            if content_length == 0:
                self._send_json(400, {"error": "empty request body"})
                return

            raw = self.rfile.read(content_length)
            try:
                nim_request = json.loads(raw)
            except json.JSONDecodeError as exc:
                self._send_json(400, {"error": f"invalid JSON: {exc}"})
                return

            try:
                vllm_request = translate_nim_to_vllm(nim_request)
            except ValueError as exc:
                self._send_json(400, {"error": str(exc)})
                return

            stripped = NIM_ONLY_FIELDS & set(nim_request.keys())
            if stripped:
                log.info("Stripped NIM-specific fields %s from embedding request", stripped)

            payload = json.dumps(vllm_request).encode()
            status, resp_data = proxy_upstream("POST", "/v1/embeddings", payload)
            self._send_raw(status, resp_data)

        def _send_json(self, status: int, body: dict):
            data = json.dumps(body).encode()
            self._send_raw(status, data)

        def _send_raw(self, status: int, data: bytes):
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def log_message(self, fmt, *args):
            log.debug(fmt, *args)


    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", PROXY_PORT), ProxyHandler)
        log.info("Embedding translation proxy listening on :%d -> %s", PROXY_PORT, UPSTREAM_URL)
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            log.info("Shutting down")
            server.shutdown()
{{- end }}
