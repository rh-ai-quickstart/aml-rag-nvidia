apiVersion: v1
kind: ConfigMap
metadata:
  name: default-mig-parted-config
  namespace: {{ .Values.operator.namespace }}
data:
  config.yaml: |
    version: v1
    mig-configs:
      # Disable MIG on all GPUs
      all-disabled:
        - devices: all
          mig-enabled: false

      # Enable MIG on all GPUs (but don't create instances)
      all-enabled:
        - devices: all
          mig-enabled: true

      # All GPUs: 7x 1g.12gb slices (good for small models)
      all-1g.12gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            "1g.12gb": 7

      # All GPUs: 2x 3g.47gb slices (good for medium models)
      all-3g.47gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            "3g.47gb": 2

      # Custom AML workload configuration (optimized for FP8 models)
      # FP8 quantization reduces memory requirements by ~50%:
      #   - LLM (49B FP8): ~70GB → fits on 2x 3g.47gb slices (92GB)
      #   - VLM (12B FP8): ~15GB → fits on 1x 1g.24gb slice (22GB)
      #   - Embedding/Reranking: ~8GB each → fit on 1g.12gb slices (11GB)
      #
      # GPU 0: 2x 3g.47gb for LLM FP8 (tensor parallel 2)
      # GPU 1: 4x 1g.24gb for VLM FP8 + 3 spares
      # GPU 2: 7x 1g.12gb for Embedding, Reranking + 5 spares
      # GPU 3-7: Keep as full GPUs (5 full H100s available!)
      #
      # Total: 1 LLM + 1 VLM + 2 small models on 3 GPUs, freeing 5 full GPUs (470GB)!
      custom-aml-workload:
        # GPU 0: Create 2x 3g.47gb slices for FP8 LLM (tensor parallel 2)
        - devices: [0]
          mig-enabled: true
          mig-devices:
            "3g.47gb": 2

        # GPU 1: Create 4x 1g.24gb slices (1 for VLM, 3 available)
        - devices: [1]
          mig-enabled: true
          mig-devices:
            "1g.24gb": 4

        # GPU 2: Create 7x 1g.12gb slices for small FP8 models
        - devices: [2]
          mig-enabled: true
          mig-devices:
            "1g.12gb": 7

        # GPU 3-7: Keep as full 94GB GPUs for future large workloads
        - devices: [3,4,5,6,7]
          mig-enabled: false
