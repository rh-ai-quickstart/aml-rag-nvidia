grafana:
  adminUser: "rhaifn"
  adminPassword: "rhaifn"
  logLevel: "warn"
  namespace: "observability-hub"
  # Set to your OpenShift cluster's route domain
  # Get it with: oc get route -A | grep apps | head -1 | awk '{print $3}' | cut -d. -f2-
  clusterDomain: "apps.launchpad.nvidia.com"

datasources:
  prometheus:
    enabled: true
    url: "https://prometheus-user-workload.openshift-user-workload-monitoring.svc.cluster.local:9091"
    isDefault: true
    
  tempo:
    enabled: true
    url: "https://tempo-tempostack-gateway.observability-hub.svc.cluster.local:8081/api/traces/v1/dev/tempo"
    isDefault: false

dashboards:
  clusterMetrics:
    enabled: false
  vllm:
    enabled: true

serviceAccount:
  tokenSecretName: "grafana-sa-token"