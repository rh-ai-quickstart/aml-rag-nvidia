# Service account token secret for Prometheus/Tempo authentication
# Note: The grafana-sa ServiceAccount must be created first (see serviceaccount.yaml)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.serviceAccount.tokenSecretName }}
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: grafana-sa
type: kubernetes.io/service-account-token