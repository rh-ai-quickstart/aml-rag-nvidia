# Job to create Grafana SA token secret after operator creates the ServiceAccount
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-sa-token-creator
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: grafana-token-creator-sa
      restartPolicy: OnFailure
      containers:
      - name: create-token-secret
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Wait for Grafana operator to create the ServiceAccount
          echo "Waiting for grafana-sa ServiceAccount..."
          for i in {1..30}; do
            if kubectl get sa grafana-sa -n {{ .Values.grafana.namespace }} 2>/dev/null; then
              echo "ServiceAccount grafana-sa found"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          # Create the token secret
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-sa-token
            namespace: {{ .Values.grafana.namespace }}
            annotations:
              kubernetes.io/service-account.name: grafana-sa
          type: kubernetes.io/service-account-token
          EOF

          echo "Grafana SA token secret created successfully"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-token-creator-sa
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-token-creator-role
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
- apiGroups: [""]
  resources: ["secrets", "serviceaccounts"]
  verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-token-creator-rolebinding
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-token-creator-role
subjects:
- kind: ServiceAccount
  name: grafana-token-creator-sa
  namespace: {{ .Values.grafana.namespace }}
