# Job to create Tempo storage secret from OBC credentials
apiVersion: batch/v1
kind: Job
metadata:
  name: tempo-storage-secret-creator
  namespace: {{ include "tempo-stack.namespace" . }}
  labels:
    {{- include "tempo-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: tempo-storage-secret-sa
      restartPolicy: OnFailure
      containers:
      - name: create-secret
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Wait for OBC secret to be created
          while ! kubectl get secret {{ .Values.objectStorage.bucketName }} -n {{ include "tempo-stack.namespace" . }} 2>/dev/null; do
            echo "Waiting for OBC secret {{ .Values.objectStorage.bucketName }}..."
            sleep 5
          done

          # Get credentials from OBC secret
          ACCESS_KEY_ID=$(kubectl get secret {{ .Values.objectStorage.bucketName }} -n {{ include "tempo-stack.namespace" . }} -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
          ACCESS_KEY_SECRET=$(kubectl get secret {{ .Values.objectStorage.bucketName }} -n {{ include "tempo-stack.namespace" . }} -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)

          # Get endpoint from OBC configmap
          BUCKET_HOST=$(kubectl get configmap {{ .Values.objectStorage.bucketName }} -n {{ include "tempo-stack.namespace" . }} -o jsonpath='{.data.BUCKET_HOST}')
          BUCKET_PORT=$(kubectl get configmap {{ .Values.objectStorage.bucketName }} -n {{ include "tempo-stack.namespace" . }} -o jsonpath='{.data.BUCKET_PORT}' || echo "80")

          # Create secret in Tempo format
          kubectl create secret generic tempo-storage \
            --from-literal=access_key_id="${ACCESS_KEY_ID}" \
            --from-literal=access_key_secret="${ACCESS_KEY_SECRET}" \
            --from-literal=bucket="{{ .Values.objectStorage.bucketName }}" \
            --from-literal=endpoint="http://${BUCKET_HOST}:${BUCKET_PORT}" \
            -n {{ include "tempo-stack.namespace" . }} \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Tempo storage secret created successfully"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tempo-storage-secret-sa
  namespace: {{ include "tempo-stack.namespace" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tempo-storage-secret-role
  namespace: {{ include "tempo-stack.namespace" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tempo-storage-secret-rolebinding
  namespace: {{ include "tempo-stack.namespace" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tempo-storage-secret-role
subjects:
- kind: ServiceAccount
  name: tempo-storage-secret-sa
  namespace: {{ include "tempo-stack.namespace" . }}