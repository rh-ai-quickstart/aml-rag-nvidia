# Default values for tempo-stack
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# Global configuration
global:
  namespace: observability-hub

# TempoStack configuration
tempoStack:
  name: tempostack
  storageSize: 15Gi
  
  # Resource limits for TempoStack
  resources:
    total:
      limits:
        memory: 10Gi
        cpu: 5
  
  # Tenant configuration
  tenants:
    mode: openshift
    authentication:
      - tenantName: dev
        tenantId: "1610b0c3-c509-4592-a256-a1871353dbfa"
  
  # Template configuration
  template:
    gateway:
      enabled: true
    queryFrontend:
      jaegerQuery:
        enabled: false
        # ingress:
        #   type: route

# Object storage configuration (ODF/NooBaa)
objectStorage:
  bucketName: tempo-traces
  storageClassName: openshift-storage.noobaa.io

# RBAC configuration
rbac:
  create: true
  
# Security configuration
podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Additional labels and annotations
commonLabels: {}
commonAnnotations: {}